id: org.aekant.Aekant
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: aekant
separate-locales: false
finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=xdg-download
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.secrets
  - --env=XDG_CURRENT_DESKTOP=GNOME

modules:
  - name: aekant
    buildsystem: simple
    build-commands:
      - mkdir -p /app/opt/aekant /app/bin /app/share/applications /app/share/icons/hicolor/128x128/apps
      - cp -r aekant/* /app/opt/aekant/
      - ln -s /app/opt/aekant/aekant /app/bin/aekant
      - cp /app/opt/aekant/browser/chrome/icons/default/default128.png /app/share/icons/hicolor/128x128/apps/org.aekant.Aekant.png
      - |
        cat <<EOF > /app/share/applications/org.aekant.Aekant.desktop
        [Desktop Entry]
        Name=Aekant Browser
        Comment=Private, fast, and secure browser
        Exec=aekant %u
        Icon=org.aekant.Aekant
        Terminal=false
        Type=Application
        Categories=Network;WebBrowser;
        MimeType=text/html;text/xml;application/xhtml+xml;
        EOF
    sources:
      - type: archive
        url: https://aekant.com//apps/aekant-2.0.1002.en-US.linux-x86_64.tar.xz
        sha256: 0 # To be updated by the CI/CD pipeline
