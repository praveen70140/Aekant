name: Release Multi-Format Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 2.0.1002)'
        required: true
        default: '2.0.1002'
      download_url:
        description: 'Direct download URL for the .tar.xz'
        required: true
        default: 'https://aekant.com//apps/aekant-2.0.1002.en-US.linux-x86_64.tar.xz'

permissions:
  contents: write

jobs:
  build-appimage:
    name: Build AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y fuse libfuse2 desktop-file-utils
      
      - name: Download and extract tarball
        run: |
          curl -L "${{ github.event.inputs.download_url }}" -o aekant.tar.xz
          mkdir -p AppDir/usr/bin
          tar -xf aekant.tar.xz -C AppDir/usr/bin/
          
      - name: Setup AppDir
        run: |
          cp appimage/AppRun AppDir/
          chmod +x AppDir/AppRun
          cp appimage/aekant.desktop AppDir/
          cp AppDir/usr/bin/aekant/browser/chrome/icons/default/default128.png AppDir/aekant.png
          
      - name: Create executable symlink
        run: |
          # The AppRun script will handle the execution
          ln -s AppRun AppDir/aekant
          
      - name: Download appimagetool
        run: |
          curl -L https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -o appimagetool
          chmod +x appimagetool
          
      - name: Build AppImage
        env:
          ARCH: x86_64
        run: |
          ./appimagetool AppDir Aekant-${{ github.event.inputs.version }}-x86_64.AppImage
          
      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aekant-AppImage
          path: Aekant-*.AppImage

  build-flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    env:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Calculate Checksum
        id: checksum
        run: |
          curl -L "${{ github.event.inputs.download_url }}" -o aekant.tar.xz
          echo "sha256=$(sha256sum aekant.tar.xz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          
      - name: Update Manifest
        run: |
          sed -i 's|url: .*|url: ${{ github.event.inputs.download_url }}|' flatpak/org.aekant.Aekant.yml
          sed -i 's|sha256: .*|sha256: ${{ steps.checksum.outputs.sha256 }}|' flatpak/org.aekant.Aekant.yml
          
      - name: Install Flatpak tools
        run: |
          sudo apt-get update && sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform/x86_64/23.08 org.freedesktop.Sdk/x86_64/23.08
        
      - name: Import GPG Key
        if: env.GPG_PRIVATE_KEY != ''
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "::group::GPG Manual Import"
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          
          # Clear any existing configuration to ensure a clean state
          rm -f ~/.gnupg/gpg-agent.conf ~/.gnupg/gpg.conf
          
          # Setup agent configuration for non-interactive passphrase entry
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" > ~/.gnupg/gpg.conf
          echo "use-agent" >> ~/.gnupg/gpg.conf
          echo "default-cache-ttl 3600" >> ~/.gnupg/gpg-agent.conf
          echo "max-cache-ttl 3600" >> ~/.gnupg/gpg-agent.conf
          chmod 600 ~/.gnupg/gpg-agent.conf ~/.gnupg/gpg.conf
          
          gpg --version
          
          # Restart agent to apply config
          gpgconf --kill gpg-agent
          
          echo "Importing Keys..."
          # Use a temporary file to avoid issues with large secrets and pipes
          echo "$GPG_PRIVATE_KEY" | base64 -d > private.key
          gpg --batch --yes --import private.key
          rm private.key
          
          if [ -n "${{ secrets.GPG_PUBLIC_KEY }}" ]; then
            echo "${{ secrets.GPG_PUBLIC_KEY }}" | base64 -d > public.key
            gpg --batch --yes --import public.key
            rm public.key
          fi
          
          # List keys for debugging
          echo "Secret Keys (Verbose):"
          gpg --list-secret-keys --keyid-format LONG --with-colons
          
          # Detect Fingerprint - try to find a signing key (master or subkey)
          # We look for 'fpr' lines and pick the first one associated with a secret key
          FPR=$(gpg --list-secret-keys --with-colons | awk -F: '$1 == "fpr" {print $10; exit}')
          echo "Detected Fingerprint: $FPR"
          
          if [ -z "$FPR" ]; then
            echo "Error: No secret key fingerprint detected!"
            exit 1
          fi
          
          # Trust the key ultimately
          echo "Setting ultimate trust..."
          echo "$FPR:6:" | gpg --batch --import-ownertrust
          
          # "Warm up" the agent - this caches the key so flatpak-builder can use it
          echo "Performing warm-up signature..."
          if [ -n "$GPG_PASSPHRASE" ]; then
            echo "test" | gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --sign --default-key "$FPR" > /dev/null || {
              echo "Warm-up signature FAILED with passphrase"
              # Try without passphrase just in case the key doesn't have one
              echo "test" | gpg --batch --sign --default-key "$FPR" > /dev/null || exit 1
            }
          else
            echo "test" | gpg --batch --sign --default-key "$FPR" > /dev/null || exit 1
          fi
          
          echo "GPG_KEY_ID=$FPR" >> $GITHUB_ENV
          echo "::endgroup::"
          
      - name: Build Flatpak
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "::group::Flatpak Build & Sign Debug"
          GPG_ARG=""
          if [ -n "$GPG_KEY_ID" ]; then
            GPG_ARG="--gpg-sign=$GPG_KEY_ID"
            echo "Signing with Key ID: $GPG_KEY_ID"
          fi
          
          # Build repo
          flatpak-builder --repo=repo --force-clean --disable-rofiles-fuse $GPG_ARG build-dir flatpak/org.aekant.Aekant.yml
          
          # Explicitly update and sign the summary
          echo "Updating and signing summary..."
          if [ -n "$GPG_KEY_ID" ]; then
            # flatpak build-update-repo uses gpg-agent, so it should use the cached passphrase from the warm-up
            flatpak build-update-repo --gpg-sign=$GPG_KEY_ID repo/
          else
            flatpak build-update-repo repo/
          fi
          
          # Verification
          echo "Verifying signature files..."
          ls -l repo/summary repo/summary.sig || echo "Summary files missing!"
          
          if [ -f repo/summary.sig ]; then
            echo "Checking summary signature validity..."
            gpg --verify repo/summary.sig repo/summary || echo "SIGNATURE VERIFICATION FAILED!"
          fi
          
          flatpak build-bundle repo Aekant.flatpak org.aekant.Aekant
          echo "::endgroup::"
          
      - name: Create .flatpakrepo file
        run: |
          cat <<EOF > aekant.flatpakrepo
          [Flatpak Repo]
          Title=Aekant Browser Repository
          Url=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/repo/
          Homepage=https://aekant.com/
          Icon=https://aekant.com/favicon.ico
          Nodefault=true
          EOF
          if [ -n "${{ secrets.GPG_PUBLIC_KEY }}" ]; then
            echo "GPGKey=${{ secrets.GPG_PUBLIC_KEY }}" >> aekant.flatpakrepo
          else
            echo "GPGVerify=false" >> aekant.flatpakrepo
          fi
          
      - name: Upload Repo Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aekant-Repo
          path: |
            repo/
            aekant.flatpakrepo

      - name: Upload Flatpak Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aekant-Flatpak
          path: Aekant.flatpak

  build-aur:
    name: Build AUR & Update PKGBUILD
    runs-on: ubuntu-latest
    env:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Calculate Checksum
        id: checksum
        run: |
          curl -L "${{ github.event.inputs.download_url }}" -o aekant.tar.xz
          echo "sha256=$(sha256sum aekant.tar.xz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          
      - name: Update PKGBUILD
        run: |
          sed -i 's/pkgver=.*/pkgver=${{ github.event.inputs.version }}/' aur/PKGBUILD
          sed -i "s/sha256sums=('0'/sha256sums=('${{ steps.checksum.outputs.sha256 }}'/" aur/PKGBUILD
          
      - name: Upload AUR Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Aekant-AUR
          path: aur/

      - name: Push to AUR
        if: env.AUR_SSH_PRIVATE_KEY != ''
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          git clone ssh://aur@aur.archlinux.org/aekant-browser-bin.git aur-repo
          cp aur/PKGBUILD aur/aekant.desktop aur-repo/
          cd aur-repo
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add PKGBUILD aekant.desktop
          git commit -m "Update to version ${{ github.event.inputs.version }}"
          git push

  push-to-ppa:
    name: Push to Launchpad PPA
    runs-on: ubuntu-latest
    env:
      HAS_LP_KEY: ${{ secrets.LAUNCHPAD_GPG_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install build tools
        if: env.HAS_LP_KEY == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev devscripts dput gnupg curl
      
      - name: Download and prepare binary source
        if: env.HAS_LP_KEY == 'true'
        run: |
          # We download the binary tarball and treat it as the "source" for Launchpad
          # This is a common pattern for binary redistribution on PPAs
          curl -L "${{ github.event.inputs.download_url }}" -o aekant.tar.xz
          # Extract everything to current directory so it's included in the source package
          tar -xf aekant.tar.xz --strip-components=1
          rm aekant.tar.xz
          
      - name: Import GPG Key
        if: env.HAS_LP_KEY == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.LAUNCHPAD_GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" > ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent
          echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --yes --import
          FPR=$(gpg --list-secret-keys --with-colons | awk -F: '$1 == "fpr" {print $10; exit}')
          echo "GPG_KEY_ID=$FPR" >> $GITHUB_ENV

      - name: Push to Launchpad
        if: env.HAS_LP_KEY == 'true'
        env:
          LP_USER: ${{ secrets.LAUNCHPAD_USER }}
          PPA_NAME: ${{ secrets.PPA_NAME }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          ./apt/push-to-ppa.sh "${{ github.event.inputs.version }}" "$LP_USER" "$PPA_NAME" "$GPG_KEY_ID" "$GPG_PASSPHRASE"

  release:
    name: Create Release & Deploy Repo
    needs: [build-appimage, build-flatpak, build-aur, push-to-ppa]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Aekant Browser v${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          files: |
            Aekant-AppImage/*.AppImage
            Aekant-Flatpak/*.flatpak
            Aekant-AUR/PKGBUILD
            Aekant-AUR/aekant.desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Flatpak Repo to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: Aekant-Repo
          branch: gh-pages
          clean: false
